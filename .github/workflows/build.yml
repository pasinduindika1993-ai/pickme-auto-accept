name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build APK
      run: |
        mkdir -p app/src/main
        cp AndroidManifest.xml app/src/main/
        cp -r src app/src/main/
        cp -r res app/src/main/
        python3 -c "
        open('settings.gradle','w').write('pluginManagement {\n  repositories {\n    google()\n    mavenCentral()\n    gradlePluginPortal()\n  }\n}\ndependencyResolutionManagement {\n  repositories {\n    google()\n    mavenCentral()\n  }\n}\nrootProject.name = \"PickMeAutoAccept\"\ninclude \":app\"\n')
        open('build.gradle','w').write('plugins {\n  id \"com.android.application\" version \"8.1.0\" apply false\n}\n')
        open('app/build.gradle','w').write('plugins {\n  id \"com.android.application\"\n}\nandroid {\n  namespace \"com.pickme.autoaccept\"\n  compileSdk 33\n  defaultConfig {\n    applicationId \"com.pickme.autoaccept\"\n    minSdk 21\n    targetSdk 33\n  }\n}\n')
        "
        wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
        unzip -q gradle-8.1-bin.zip
        ./gradle-8.1/bin/gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: pickme-apk
        path: app/build/outputs/apk/debug/*.apk
