name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build APK
      run: |
        mkdir -p app/src/main
        cp AndroidManifest.xml app/src/main/
        cp -r src app/src/main/
        cp -r res app/src/main/
        printf "rootProject.name = 'PickMeAutoAccept'\ninclude ':app'\n" > settings.gradle
        printf "buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }\n}\n" > build.gradle
        printf "apply plugin: 'com.android.application'\nandroid {\n  namespace 'com.pickme.autoaccept'\n  compileSdkVersion 33\n  defaultConfig {\n    applicationId 'com.pickme.autoaccept'\n    minSdkVersion 21\n    targetSdkVersion 33\n  }\n}\n" > app/build.gradle
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: pickme-apk
        path: app/build/outputs/apk/debug/*.apk
