name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build APK with ant
      run: |
        sudo apt-get install -y ant android-sdk
        android update project -p . -n PickMeAutoAccept --target android-33
        ant debug
    - uses: actions/upload-artifact@v4
      with:
        name: pickme-apk
        path: bin/*.apk
