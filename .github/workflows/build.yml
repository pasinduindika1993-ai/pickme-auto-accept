name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Create project files
      run: |
        mkdir -p app/src/main
        cp AndroidManifest.xml app/src/main/
        cp -r src app/src/main/
        cp -r res app/src/main/
        echo 'rootProject.name = "PickMeAutoAccept"' > settings.gradle
        echo 'include ":app"' >> settings.gradle
        echo 'buildscript {' > build.gradle
        echo '  repositories { google(); mavenCentral() }' >> build.gradle
        echo '  dependencies { classpath "com.android.tools.build:gradle:8.1.0" }' >> build.gradle
        echo '}' >> build.gradle
        echo 'apply plugin: "com.android.application"' > app/build.gradle
        echo 'android {' >> app/build.gradle
        echo '  namespace "com.pickme.autoaccept"' >> app/build.gradle
        echo '  compileSdkVersion 33' >> app/build.gradle
        echo '  defaultConfig {' >> app/build.gradle
        echo '    applicationId "com.pickme.autoaccept"' >> app/build.gradle
        echo '    minSdkVersion 21' >> app/build.gradle
        echo '    targetSdkVersion 33' >> app/build.gradle
        echo '  }' >> app/build.gradle
        echo '}' >> app/build.gradle
        gradle wrapper --gradle-version 8.1
        chmod +x gradlew
    - name: Build APK
      run: ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: pickme-apk
        path: app/build/outputs/apk/debug/*.apk
