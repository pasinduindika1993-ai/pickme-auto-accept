name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build APK
      run: |
        mkdir -p app/src/main
        cp AndroidManifest.xml app/src/main/
        cp -r src app/src/main/
        cp -r res app/src/main/
        cat > settings.gradle << 'SEOF'
pluginManagement {
  repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
  }
}
dependencyResolutionManagement {
  repositories {
    google()
    mavenCentral()
  }
}
rootProject.name = "PickMeAutoAccept"
include ":app"
SEOF
        cat > build.gradle << 'BEOF'
plugins {
  id "com.android.application" version "8.1.0" apply false
}
BEOF
        cat > app/build.gradle << 'AEOF'
plugins {
  id "com.android.application"
}
android {
  namespace "com.pickme.autoaccept"
  compileSdk 33
  defaultConfig {
    applicationId "com.pickme.autoaccept"
    minSdk 21
    targetSdk 33
  }
}
AEOF
        wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
        unzip -q gradle-8.1-bin.zip
        ./gradle-8.1/bin/gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: pickme-apk
        path: app/build/outputs/apk/debug/*.apk
