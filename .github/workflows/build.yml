name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build APK
      run: |
        mkdir -p app/src/main
        cp AndroidManifest.xml app/src/main/
        cp -r src app/src/main/
        cp -r res app/src/main/
        echo 'rootProject.name = "PickMeAutoAccept"' > settings.gradle
        echo 'include ":app"' >> settings.gradle
        echo 'plugins { id "com.android.application" version "8.1.0" apply false }' > build.gradle
        echo 'plugins { id "com.android.application" }' > app/build.gradle
        echo 'android {' >> app/build.gradle
        echo '  namespace "com.pickme.autoaccept"' >> app/build.gradle
        echo '  compileSdk 33' >> app/build.gradle
        echo '  defaultConfig {' >> app/build.gradle
        echo '    applicationId "com.pickme.autoaccept"' >> app/build.gradle
        echo '    minSdk 21' >> app/build.gradle
        echo '    targetSdk 33' >> app/build.gradle
        echo '  }' >> app/build.gradle
        echo '}' >> app/build.gradle
        wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
        unzip -q gradle-8.1-bin.zip
        ./gradle-8.1/bin/gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: pickme-apk
        path: app/build/outputs/apk/debug/*.apk
